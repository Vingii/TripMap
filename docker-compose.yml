services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: tripmap:dev
    container_name: tripmap
    ports:
      - "8000:8000"
    environment:
      STATIC_DIR: /app/static
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8000"]'
    volumes:
      # `:z` relabels the host dir with the shared container SELinux label so
      # the non-root user inside the container can read it on Fedora/RHEL.
      - ./backend/app:/app/app:ro,z
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
