<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripMap</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the
      // wrong theme. Kept in sync with the theme store's storage key.
      ;(function () {
        try {
          if (localStorage.getItem('tripmap.theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          /* localStorage unavailable — fall back to light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
