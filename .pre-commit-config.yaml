repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/.*\.py$
      - id: ruff-format
        files: ^backend/.*\.py$
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict, --config-file=backend/pyproject.toml]
        files: ^backend/app/.*\.py$
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.5
          - fastapi>=0.115
          - sqlalchemy>=2.0
          - geoalchemy2>=0.15
          - httpx>=0.27
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: frontend/node_modules/.bin/eslint --fix
        language: system
        files: \.(ts|vue)$
        pass_filenames: true
